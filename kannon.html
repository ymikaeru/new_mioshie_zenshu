<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>if(sessionStorage.getItem('mioshie_auth')!=='true')document.documentElement.style.display='none';</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palestras de Kannon — Mioshie Zenshu</title>
  <meta name="description" content="Série de 40 palestras de Meishu-Sama sobre o Movimento Kannon, em português e japonês.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Noto+Serif+JP:wght@400;600&display=swap">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/reader.css">

  <!-- marked.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js" defer></script>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#B8860B">

  <script>
    (function() {
      var t = localStorage.getItem('site_theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <style>
    .kannon-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 0;
      min-height: calc(100vh - var(--header-h) - 60px);
      margin-top: var(--header-h);
    }
    .kannon-sidebar {
      border-right: 1px solid var(--border);
      padding: 24px 0;
      overflow-y: auto;
      position: sticky;
      top: var(--header-h);
      height: calc(100vh - var(--header-h));
      background: var(--surface);
    }
    .kannon-sidebar-title {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 20px 12px;
    }
    .kannon-nav-item {
      display: block;
      padding: 10px 20px;
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--text-main);
      text-decoration: none;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      line-height: 1.4;
    }
    .kannon-nav-item:hover {
      background: var(--hover-bg);
      color: var(--accent);
    }
    .kannon-nav-item.active {
      border-left-color: var(--accent);
      background: var(--hover-bg);
      color: var(--accent);
      font-weight: 500;
    }
    .kannon-nav-item__num {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .kannon-main {
      padding: 40px;
      max-width: 760px;
    }
    .kannon-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 40px;
      color: var(--text-muted);
      gap: 16px;
      font-family: var(--font-ui);
    }
    .kannon-browse {
      padding: 40px;
    }
    .kannon-browse h1 {
      font-family: var(--font-ui);
      font-size: 28px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 8px;
    }
    .kannon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-top: 32px;
    }
    .kannon-card {
      display: block;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text-main);
      transition: all 0.2s;
    }
    .kannon-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px var(--shadow);
    }
    .kannon-card__num {
      font-size: 11px;
      font-family: var(--font-ui);
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 6px;
    }
    .kannon-card__title {
      font-size: 15px;
      font-weight: 500;
      font-family: var(--font-ui);
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .kannon-card__snippet {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .kannon-browse-pub {
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--text-muted);
      margin: 20px 0 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    @media (max-width: 768px) {
      .kannon-layout {
        grid-template-columns: 1fr;
      }
      .kannon-sidebar {
        display: none;
      }
      .kannon-main, .kannon-browse {
        padding: 24px 16px;
      }
    }
  </style>
</head>
<body class="page-reader">

<!-- ─── Header ──────────────────────────────────────────────── -->
<header class="header" role="banner">
  <a href="browse.html" class="header__logo" aria-label="Mioshie Zenshu">
    <div class="logo-circle" aria-hidden="true"><div class="logo-dot"></div></div>
    <span>Mioshie Zenshu</span>
  </a>
  <nav class="header__nav" aria-label="Navegação principal">
    <a href="browse.html">Ensinamentos</a>
    <a href="poems.html">Gosanka</a>
    <a href="kannon.html" class="active">Kannon</a>
    <a href="johrei.html">Johrei</a>
    <a href="library.html">Biblioteca</a>
    <a href="timeline.html">Timeline</a>
  </nav>
  <!-- Controls injected by app.js -->
</header>

<!-- ─── Layout ──────────────────────────────────────────────── -->
<div class="kannon-layout" id="kannonLayout">

  <!-- Sidebar -->
  <aside class="kannon-sidebar" id="kannonSidebar">
    <div class="kannon-sidebar-title">
      <span class="lang-pt">Palestras de Kannon</span>
      <span class="lang-ja" style="display:none">観音講座</span>
    </div>
    <div id="sidebarContent">
      <!-- populated by JS -->
    </div>

  <!-- Main -->
  <main class="kannon-main" id="kannonMain" role="main">
    <div id="kannonContent">
      <div class="kannon-loading">
        <div class="reader-loading__spinner"></div>
        <p class="lang-pt">Carregando palestras…</p>
        <p class="lang-ja" style="display:none">読み込み中…</p>
      </div>
    </div>
  </main>

</div>

<!-- Toast -->
<div id="siteToast" class="toast" role="status" aria-live="polite"></div>

<!-- Footer -->
<footer class="footer" role="contentinfo">
  <div class="footer__inner">
    <div class="footer__logo">
      <div class="logo-circle logo-circle--sm" aria-hidden="true"><div class="logo-dot"></div></div>
      <span>Mioshie Zenshu</span>
    </div>
    <p class="footer__copy">
      <span class="lang-pt">Mioshie Zenshu — Biblioteca Sagrada dos Ensinamentos de Meishu-Sama.</span>
      <span class="lang-ja" style="display:none">御教え全集 — 明主様御教え聖典図書館。</span>
    </p>
  </div>
</footer>

<!-- Scripts -->
<script src="js/app.js?v=2" defer></script>
<script defer>
// Kannon page logic
const KANNON_DATA = 'data/kannon/kannon_fixed.json';
let _allKannon = null;
let _currentKannon = null;

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function stripMd(str) {
  if (!str) return '';
  return str.replace(/^#{1,6}\s+/gm,'').replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').replace(/\n+/g,' ').trim();
}

// Extrai o título real do primeiro heading ## no content_ptbr
function getRealTitle(item) {
  const content = item.content_ptbr || item.content || '';
  const m = content.match(/^#{1,3}\s+(.+)$/m);
  if (m) return m[1].trim();
  // Fallback: use title field se não for apenas o id
  const t = item.title || '';
  return (t && !t.match(/^(kannon|ta_|ka_|sasshi_)/)) ? t : '';
}

// Classifica o item por grupo
function getGroup(item) {
  if (item.id.startsWith('ta_')) return 'curso';
  if (item.id === 'sasshi_kannon') return 'coletanea';
  return 'ensinamentos';
}

// Define numeração só dentro do grupo "ensinamentos" (ka_kannon*) por ID numérico
function getKannonNum(item) {
  const m = item.id.match(/ka_kannon(\d+)/);
  return m ? parseInt(m[1]) : 999;
}

document.addEventListener('DOMContentLoaded', async () => {
  await loadKannon();
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (id) openKannon(id);
  else showBrowse();
});

async function loadKannon() {
  if (_allKannon) return;
  const res = await fetch(KANNON_DATA);
  _allKannon = await res.json();
}

function showBrowse() {
  const content = document.getElementById('kannonContent');
  const main = document.getElementById('kannonMain');
  main.className = '';
  main.style.maxWidth = '';
  main.style.padding = '0';

  buildSidebar(null);

  // Separar em grupos
  const curso       = _allKannon.filter(k => getGroup(k) === 'curso');
  const ensinamentos = _allKannon.filter(k => getGroup(k) === 'ensinamentos')
                                  .sort((a, b) => getKannonNum(a) - getKannonNum(b));
  const coletanea   = _allKannon.filter(k => getGroup(k) === 'coletanea');

  function renderGroup(items, labelPrefix) {
    return items.map((k, i) => {
      const title = getRealTitle(k);
      const snippet = stripMd(k.content_ptbr || k.content || '').substring(0, 140);
      const num = labelPrefix ? `${labelPrefix} ${i + 1}` : '';
      return `<a href="kannon.html?id=${encodeURIComponent(k.id)}" class="kannon-card" onclick="navigateKannon('${escHtml(k.id)}'); return false;">
        ${num ? `<div class="kannon-card__num">${escHtml(num)}</div>` : ''}
        <div class="kannon-card__title">${escHtml(title)}</div>
        ${snippet ? `<div class="kannon-card__snippet">${escHtml(snippet)}…</div>` : ''}
      </a>`;
    }).join('');
  }

  let html = `<div class="kannon-browse">
    <h1 class="lang-pt">Palestras de Kannon</h1>
    <h1 class="lang-ja" style="display:none">観音講座</h1>
    <p style="color:var(--text-muted);font-family:var(--font-ui);font-size:14px;margin:4px 0 24px">
      ${curso.length} aulas do Curso · ${ensinamentos.length} ensinamentos avulsos
    </p>`;

  if (curso.length) {
    html += `<div class="kannon-browse-pub">Kannon Koza — Curso de Kannon</div>
      <div class="kannon-grid">${renderGroup(curso, 'Aula')}</div>`;
  }
  if (ensinamentos.length) {
    html += `<div class="kannon-browse-pub">Ensinamentos sobre Kannon</div>
      <div class="kannon-grid">${renderGroup(ensinamentos, '')}</div>`;
  }
  if (coletanea.length) {
    html += `<div class="kannon-browse-pub">Coletânea</div>
      <div class="kannon-grid">${renderGroup(coletanea, '')}</div>`;
  }

  html += `</div>`;
  content.innerHTML = html;
}

function buildSidebar(activeId) {
  if (!_allKannon) return;

  const curso       = _allKannon.filter(k => getGroup(k) === 'curso');
  const ensinamentos = _allKannon.filter(k => getGroup(k) === 'ensinamentos')
                                  .sort((a, b) => getKannonNum(a) - getKannonNum(b));
  const coletanea   = _allKannon.filter(k => getGroup(k) === 'coletanea');

  function navItems(items, labelPrefix) {
    return items.map((k, i) => {
      const isActive = k.id === activeId;
      const title = getRealTitle(k);
      const num = labelPrefix ? `${labelPrefix} ${i + 1}` : '';
      return `<a href="kannon.html?id=${encodeURIComponent(k.id)}" class="kannon-nav-item${isActive ? ' active' : ''}" onclick="navigateKannon('${escHtml(k.id)}'); return false;">
        ${num ? `<div class="kannon-nav-item__num">${escHtml(num)}</div>` : ''}
        ${escHtml(title)}
      </a>`;
    }).join('');
  }

  let html = '';
  if (curso.length) {
    html += `<div style="padding:12px 20px 4px;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent)">Kannon Koza</div>`;
    html += navItems(curso, 'Aula');
  }
  if (ensinamentos.length) {
    html += `<div style="padding:16px 20px 4px;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent)">Ensinamentos</div>`;
    html += navItems(ensinamentos, '');
  }
  if (coletanea.length) {
    html += `<div style="padding:16px 20px 4px;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent)">Coletânea</div>`;
    html += navItems(coletanea, '');
  }

  document.getElementById('sidebarContent').innerHTML = html;

  if (activeId) {
    setTimeout(() => {
      document.querySelector('.kannon-nav-item.active')?.scrollIntoView({ block: 'nearest' });
    }, 100);
  }
}

function openKannon(id) {
  const item = _allKannon?.find(k => k.id === id);
  if (!item) { showBrowse(); return; }
  _currentKannon = item;

  const group = getGroup(item);
  const groupItems = group === 'curso'
    ? _allKannon.filter(k => getGroup(k) === 'curso')
    : group === 'ensinamentos'
      ? _allKannon.filter(k => getGroup(k) === 'ensinamentos').sort((a,b) => getKannonNum(a)-getKannonNum(b))
      : _allKannon.filter(k => getGroup(k) === 'coletanea');

  const idxInGroup = groupItems.findIndex(k => k.id === id);
  const prev = idxInGroup > 0 ? groupItems[idxInGroup - 1] : null;
  const next = idxInGroup < groupItems.length - 1 ? groupItems[idxInGroup + 1] : null;

  const title = getRealTitle(item);
  const lang = localStorage.getItem('site_lang') || 'pt';
  const isPt = lang !== 'ja';
  const rawContent = isPt ? (item.content_ptbr || item.content || '') : (item.content || item.content_ptbr || '');

  let htmlContent;
  if (typeof marked !== 'undefined' && isPt) {
    htmlContent = marked.parse(rawContent);
  } else {
    htmlContent = rawContent.split(/\n{2,}/).filter(Boolean).map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
  }

  const main = document.getElementById('kannonMain');
  const content = document.getElementById('kannonContent');
  main.className = 'kannon-main';

  buildSidebar(id);

  const groupLabel = group === 'curso'
    ? `Kannon Koza — Aula ${idxInGroup + 1} de ${groupItems.length}`
    : group === 'ensinamentos'
      ? `Ensinamento sobre Kannon`
      : `Coletânea`;

  content.innerHTML = `
    <nav class="breadcrumbs" aria-label="Caminho">
      <a href="kannon.html" onclick="showBrowse();return false;" class="lang-pt">Palestras de Kannon</a>
      <span> / </span>
      <span>${escHtml(title)}</span>
    </nav>
    <article class="teaching-article">
      <header class="teaching-header">
        <div class="teaching-category lang-pt">${escHtml(groupLabel)}</div>
        <h1 class="teaching-title">${escHtml(title)}</h1>
        <div class="teaching-actions">
          <button class="action-btn" onclick="toggleFavKannon()" id="kannonFavBtn" title="Salvar">
            <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            <span class="lang-pt">Salvar</span>
          </button>
        </div>
      </header>
      <div class="reader-content" id="kannonText">${htmlContent}</div>
      <div class="reader-nav-footer">
        ${prev ? `<a href="kannon.html?id=${encodeURIComponent(prev.id)}" class="nav-footer-btn" onclick="navigateKannon('${escHtml(prev.id)}');return false;"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg><span>Anterior</span></a>` : '<span></span>'}
        ${next ? `<a href="kannon.html?id=${encodeURIComponent(next.id)}" class="nav-footer-btn nav-footer-btn--next" onclick="navigateKannon('${escHtml(next.id)}');return false;"><span>Próximo</span><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></a>` : '<span></span>'}
      </div>
    </article>`;

  document.title = `${title || 'Palestra'} — Kannon — Mioshie Zenshu`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.navigateKannon = function(id) {
  window.history.pushState({ id }, '', `kannon.html?id=${encodeURIComponent(id)}`);
  openKannon(id);
};

window.toggleFavKannon = function() {
  if (!_currentKannon) return;
  const title = getRealTitle(_currentKannon);
  let favs = [];
  try { favs = JSON.parse(localStorage.getItem('zenshu_favorites') || '[]'); } catch(e) {}
  const idx = favs.findIndex(f => f.id === _currentKannon.id);
  if (idx !== -1) favs.splice(idx, 1);
  else favs.unshift({ id: _currentKannon.id, title, cat: 'Kannon', time: Date.now() });
  try { localStorage.setItem('zenshu_favorites', JSON.stringify(favs.slice(0,100))); } catch(e) {}
  showToast?.(idx !== -1 ? 'Removido dos salvos' : 'Salvo!');
};

window.addEventListener('popstate', () => {
  const id = new URLSearchParams(window.location.search).get('id');
  if (id) openKannon(id); else showBrowse();
});
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(() => {}); });
  }
</script>
</body>
</html>
